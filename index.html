<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon / App icons ──────────────────────────────────── -->
    <!-- SVG favicon (modern browsers — scales perfectly to any size) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PNG fallback for older browsers -->
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon.png" />
    <!-- Apple devices home-screen icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/images/logo-xpel-beauty-ng.png" />
    <!-- Android / PWA theme colour (matches nav brand colour) -->
    <meta name="theme-color" content="#1B2A3B" />
    <!-- Windows tile -->
    <meta name="msapplication-TileColor" content="#1B2A3B" />

    <!-- ── Base SEO (overwritten per-page by the SEO component) ── -->
    <title>Xpel Beauty NG — Reveal the Beauty Within</title>
    <meta name="description" content="Shop Xpel Beauty Care products in Nigeria — premium hair care, skin care, oral care and body care essentials. Nature-infused formulas at unbeatable prices, available nationwide." />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- ── Open Graph ────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:locale"      content="en_NG" />
    <meta property="og:site_name"   content="Xpel Beauty NG" />
    <meta property="og:title"       content="Xpel Beauty NG — Reveal the Beauty Within" />
    <meta property="og:description" content="Shop Xpel Beauty Care products in Nigeria — premium hair care, skin care, oral care and body care essentials. Nature-infused formulas at unbeatable prices." />
    <meta property="og:image"       content="/banner/Brand_Argan_Oil_V3.webp" />

    <!-- ── Twitter Card ─────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Xpel Beauty NG — Reveal the Beauty Within" />
    <meta name="twitter:description" content="Shop Xpel Beauty Care products in Nigeria — premium hair care, skin care, oral care and body care essentials. Nature-infused formulas at unbeatable prices." />
    <meta name="twitter:image"       content="/banner/Brand_Argan_Oil_V3.webp" />

    <!-- ── Preconnect for performance ───────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Luxury fonts: Cormorant Garamond (display) + Jost (body/UI) + Urbanist (nav/label chrome) -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Jost:wght@200;300;400;500;600;700&family=Urbanist:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
